name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # 服务器连接配置 (优先使用默认支持的公开环境变量，避免在各个 Step 中重复书写 env. 引用)
  HOST: ${{ secrets.SERVER_HOST || secrets.HOST }}
  PORT: ${{ secrets.SERVER_PORT || secrets.PORT || '22' }}
  USERNAME: ${{ secrets.SERVER_USERNAME || secrets.USERNAME }}
  KEY: ${{ secrets.SERVER_SSH_KEY || secrets.SSH_PRIVATE_KEY }}

  # 部署路径配置
  APP_DEPLOY_PATH: ${{ secrets.APP_DEPLOY_PATH || vars.APP_DEPLOY_PATH }}
  APP_TEMP_DEPLOY_PATH: /tmp/tob_app_site



jobs:
  check:
    name: Typecheck, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile && pnpm lingui:compile && pnpm tsr generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm check:ci

      - name: Test
        run: pnpm test

  deploy-app:
    name: Build and Deploy React App to Server
    runs-on: ubuntu-latest
    needs: check
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile && pnpm lingui:compile && pnpm tsr generate

      - name: Build React App
        run: pnpm build

      - name: Prepare temp directory on server
        uses: appleboy/ssh-action@master
        with:
          envs: APP_TEMP_DEPLOY_PATH
          script: |
            mkdir -p $APP_TEMP_DEPLOY_PATH
            rm -rf $APP_TEMP_DEPLOY_PATH/*

      - name: Upload app static files via SCP
        uses: appleboy/scp-action@master
        with:
          source: "dist/*"
          target: "/tmp/tob_app_site"
          strip_components: 1

      - name: Deploy to Nginx path
        uses: appleboy/ssh-action@master
        with:
          envs: APP_DEPLOY_PATH,APP_TEMP_DEPLOY_PATH
          script: |
            sudo mkdir -p $APP_DEPLOY_PATH
            sudo rm -rf $APP_DEPLOY_PATH/*
            sudo cp -r $APP_TEMP_DEPLOY_PATH/* $APP_DEPLOY_PATH/
            rm -rf $APP_TEMP_DEPLOY_PATH

  